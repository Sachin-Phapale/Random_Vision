services:
  # 1. Backend Web Service (Docker deployment)
  - type: web
    name: mail-agent-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    rootDir: backend
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false # Enter your existing database JDBC URL (e.g., jdbc:postgresql://random-vision-db:5432/random_vision)
      - key: SPRING_DATASOURCE_USERNAME
        sync: false # Enter your existing database username (e.g., rv_user)
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false # Enter your existing database password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: 3600000
      - key: JWT_REFRESH_EXPIRATION_MS
        value: 864000000
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com # Replace with your real SMTP host
      - key: SPRING_MAIL_PORT
        value: 587
      - key: SPRING_MAIL_USERNAME
        sync: false # Set in Render Dashboard
      - key: SPRING_MAIL_PASSWORD
        sync: false # Set in Render Dashboard

  # 2. Frontend Static Site (Builds Vite output and serves it)
  - type: web
    name: mail-agent-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://mail-agent-backend.onrender.com # Update this in Render Dashboard if your backend URL differs


